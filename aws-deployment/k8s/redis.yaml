apiVersion: apps/v1
kind: Deployment
metadata:
  name: brd-loancrm-redis
  namespace: brd-loancrm
  labels:
    app: brd-loancrm-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brd-loancrm-redis
  template:
    metadata:
      labels:
        app: brd-loancrm-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: brd-loancrm-redis
  namespace: brd-loancrm
  labels:
    app: brd-loancrm-redis
spec:
  selector:
    app: brd-loancrm-redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: brd-loancrm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: gp2
