version: '3.9'

networks:
  loancrm_network:
    driver: bridge

volumes:
  redis_data:
  static_files:
  media_files:

services:

  redis:
    image: redis:7-alpine
    container_name: loancrm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis_data:/data
    networks:
      - loancrm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.25-alpine
    container_name: loancrm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    networks:
      - loancrm_network
    depends_on:
      - masteradmin-backend
      - tenant-backend
      - crm-backend
      - finance-backend
      - agents-backend
      - channel-backend
      - fraud-backend
      - legal-backend
      - operations-backend
      - salescrm-backend
      - tenantadmin-backend
      - valuation-backend

  masteradmin-backend:
    build:
      context: ./BRD_MasterAdmin_Backend_1.1
      dockerfile: Dockerfile
    container_name: loancrm_masteradmin_backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file: ./BRD_MasterAdmin_Backend_1.1/.env
    volumes:
      - static_files:/app/static
      - media_files:/app/media
    networks:
      - loancrm_network
    depends_on:
      redis:
        condition: service_healthy

  tenant-backend:
