limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
upstream website_backend     { server website-backend:8000; }
upstream masteradmin_backend { server masteradmin-backend:8001; }
upstream tenant_backend      { server tenant-backend:8002; }
upstream crm_backend         { server crm-backend:8003; }
upstream finance_backend     { server finance-backend:8004; }
upstream agents_backend      { server agents-backend:8005; }
upstream channel_backend     { server channel-backend:8006; }
upstream fraud_backend       { server fraud-backend:8007; }
upstream legal_backend       { server legal-backend:8008; }
upstream operations_backend  { server operations-backend:8009; }
upstream salescrm_backend    { server salescrm-backend:8010; }
upstream tenantadmin_backend { server tenantadmin-backend:8011; }
upstream valuation_backend   { server valuation-backend:8012; }
server {
    listen 80;
    server_name 13.232.219.91 localhost;
    client_max_body_size 100M;
    location / { proxy_pass http://website-frontend:80; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /master-admin { proxy_pass http://masteradmin-frontend:80; proxy_set_header Host $host; }
    location /tenant       { proxy_pass http://tenant-frontend:80;      proxy_set_header Host $host; }
    location /crm          { proxy_pass http://crm-frontend:80;         proxy_set_header Host $host; }
    location /finance      { proxy_pass http://finance-frontend:80;     proxy_set_header Host $host; }
    location /sales        { proxy_pass http://salescrm-frontend:80;    proxy_set_header Host $host; }
    location /api/website/    { proxy_pass http://website_backend;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/admin/      { proxy_pass http://masteradmin_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/tenant/     { proxy_pass http://tenant_backend;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/crm/        { proxy_pass http://crm_backend;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/finance/    { proxy_pass http://finance_backend;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/agents/     { proxy_pass http://agents_backend;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/channel/    { proxy_pass http://channel_backend;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/fraud/      { proxy_pass http://fraud_backend;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/legal/      { proxy_pass http://legal_backend;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/operations/ { proxy_pass http://operations_backend;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/sales/      { proxy_pass http://salescrm_backend;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/tenantadmin/{ proxy_pass http://tenantadmin_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/valuation/  { proxy_pass http://valuation_backend;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}
